name: aggregate-selfhosted

on:
  workflow_dispatch:
  schedule:
    - cron: "47 */6 * * *"

permissions:
  contents: write

concurrency:
  group: aggregate-selfhosted
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: [self-hosted, linux, x64, xiaokai-prod]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - name: Check Go
        run: |
          which go
          go version

      - name: Install sing-box
        run: |
          version=1.13.8
          rm -rf sing-box-install
          mkdir -p sing-box-install
          curl -fsSLo sing-box.tar.gz "https://github.com/SagerNet/sing-box/releases/download/v${version}/sing-box-${version}-linux-amd64.tar.gz"
          tar -xzf sing-box.tar.gz -C sing-box-install
          sudo install -m 0755 sing-box-install/sing-box-${version}-linux-amd64/sing-box /usr/local/bin/sing-box
          sudo mkdir -p /usr/local/bin
          which sing-box
          sing-box version

      - name: Run aggregate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run ./cmd/fnctl aggregate -c config.yaml

      - name: Commit outputs
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add output docs README*.md
          if git diff --cached --quiet; then
            echo "No output changes"
            exit 0
          fi
          git commit -m "chore: refresh subscriptions (self-hosted)"
          git push
