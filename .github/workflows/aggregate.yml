name: aggregate

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install sing-box
        run: |
          version=1.13.8
          curl -fsSLo sing-box.deb "https://github.com/SagerNet/sing-box/releases/download/v${version}/sing-box_${version}_linux_amd64.deb"
          sudo dpkg -i sing-box.deb
          sudo mkdir -p /usr/local/bin
          sudo ln -sf /usr/bin/sing-box /usr/local/bin/sing-box
          which sing-box
          sing-box version

      - name: Run aggregate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run ./cmd/fnctl aggregate -c config.yaml

      - name: Commit outputs
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add output docs README*.md
          if git diff --cached --quiet; then
            echo "No output changes"
            exit 0
          fi
          git commit -m "chore: refresh subscriptions"
          git push
